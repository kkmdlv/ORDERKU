<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>KUKAMI DELIVERY</title>

  <meta name="theme-color" content="#5b0f16">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <link rel="apple-touch-icon" href="icon-192.png">

</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">

  <div class="header-left">

    <img
      src="logo (2).png"
      class="logo"
      alt="KUKAMI DELIVERY"
    >

    <div>
      <h1>KUKAMI DELIVERY</h1>
      <p>Form Order</p>
    </div>

  </div>

  <button id="installBtn" class="install-btn">
    Install App
  </button>

</div>
  <!-- CARD -->
  <div class="card">

    <form id="orderForm">

  <div class="input-group">
    <label>Nama Lengkap</label>

    <input
      type="text"
      id="nama"
      placeholder="Contoh: Budi Setiawan"
      required
    >
  </div>

  <div class="input-group">
    <label>No WhatsApp</label>

    <input
  type="tel"
  id="wa"
  value="62"
  placeholder="628123456789"
  required
>
  </div>

  <div class="input-group">
    <label>Alamat Lengkap</label>

    <textarea
      id="alamat"
      placeholder="Contoh: Perum Griya Asri Blok A2 No 10"
      required
    ></textarea>
   
  </div>

  <input type="hidden" id="sharelok">
      

  <div class="input-group">
    <label>Pesanan</label>

    <textarea
      id="pesanan"
      placeholder="Contoh: Ayam geprek 2, es teh 1 atau kirim paket atau jemput dimana antar kemana"
      required
    ></textarea>

    <small style="color:gray">
      Tulis detail pesanan dengan jelas, kirim paket, ambilin pesanan, dll. Boleh lebih dari 1 tempat
    </small>
  </div>

  <div class="input-group">
    <label>Pembayaran</label>

    <select id="pembayaran" required>
      <option value="">Pilih Metode Pembayaran</option>
      <option value="Cash">Cash</option>
      <option value="Transfer">Transfer</option>
    </select>
  </div>

  <button type="submit" class="submit-btn">
    KIRIM PESANAN
  </button>

</form>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
